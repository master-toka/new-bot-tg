version: '3.8'

services:
  bot:
    build: .
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_ID=${ADMIN_ID}
      - GROUP_ID=${GROUP_ID}
      - GEOCODER_API_KEY=${GEOCODER_API_KEY}
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db/bot_db
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15
    environment:
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=bot_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data: